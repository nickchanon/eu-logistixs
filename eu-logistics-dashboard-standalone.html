/229130/369001-0"},{id:"pub-003",publish_date:"2026-03-20",firm:"Knight Frank",title:"UK Industrial & Logistics Market Update Q1 2026",country:"UK",sector:"Industrial & Logistics",summary:"Take-up reached 8.2m sq ft in Q1 2026, driven by 3PL and retail occupiers. Vacancy rates remain historically low at 3.8%, supporting continued landlord leverage in lease negotiations. Prime rents at major distribution parks are holding above £12/sqft in the Midlands Golden Triangle.",url:"https://www.knightfrank.co.uk/research/article/2026-03-20-uk-industrial-logistics"},{id:"pub-004",publish_date:"2026-04-22",firm:"JLL",title:"UK Logistics Pulse Q1 2026",country:"UK",sector:"Industrial & Logistics",summary:"JLL reports continued occupier demand from e-commerce and pharmaceutical sectors driving UK logistics take-up. Net effective rents have increased 5% year-on-year in South East England. Development completions are expected to peak in H2 2026 before returning to undersupply.",url:"https://www.jll.co.uk/en/trends-and-insights/research/uk-logistics-market"},{id:"pub-005",publish_date:"2026-05-08",firm:"CBRE",title:"UK Industrial & Logistics MarketView Q1 2026",country:"UK",sector:"Industrial & Logistics",summary:"CBRE's Q1 2026 review shows UK logistics investment volumes of £1.8bn, up 22% on Q1 2025. Prime yields compressed 25bps in South East logistics driven by overseas capital. Speculative development pipeline stands at 18m sq ft nationally, with 60% pre-let.",url:"https://www.cbre.co.uk/insights/reports/uk-industrial-and-logistics-marketview-q1-2026"},{id:"pub-006",publish_date:"2026-03-15",firm:"Colliers",title:"Colliers UK Logistics & Industrial Report 2026",country:"UK",sector:"Industrial & Logistics",summary:"Colliers highlights the polarisation of logistics demand between mega-shed requirements (500,000+ sq ft) and last-mile urban logistics. Prime yields in core UK logistics markets are forecast to firm to 4.50% by end-2026 on strong investor demand. Rental growth is led by London Heathrow and Thames Gateway submarkets.",url:"https://www.colliers.com/en-gb/research/uk-logistics-industrial-2026"},{id:"pub-007",publish_date:"2026-04-18",firm:"BNP Paribas Real Estate",title:"UK Logistics Market Monitor Spring 2026",country:"UK",sector:"Industrial & Logistics",summary:"BNP Paribas RE reports robust logistics market fundamentals in the UK with take-up tracking 15% above five-year average. Cross-docking and last-mile facilities continue to attract premium rents. ESG compliance is increasingly a condition of institutional investment, driving fit-out upgrades across standing stock.",url:"https://www.realestate.bnpparibas.com/uk-logistics-spring-2026"},{id:"pub-008",publish_date:"2026-05-20",firm:"Savills",title:"German Logistics Market H1 2026 Review",country:"Germany",sector:"Industrial & Logistics",summary:"Savills reports German logistics take-up of 2.1m sqm in H1 2026, 8% above the five-year average. Prime rents in Frankfurt reached €95/sqm/yr, a new record. Yield stabilisation at 4.80% reflects the resilience of German logistics as an asset class against a backdrop of improving economic sentiment.",url:"https://www.savills.de/research_articles/260799/german-logistics-2026"},{id:"pub-009",publish_date:"2026-04-05",firm:"JLL",title:"Germany Industrial & Logistics Market Report Q1 2026",country:"Germany",sector:"Industrial & Logistics",summary:"JLL's Q1 2026 report shows German logistics benefiting from nearshoring trends and automotive sector resilience. Munich and Hamburg are the most active leasing markets. Prime rents are expected to grow 3–5% in 2026 driven by structural undersupply in urban logistics.",url:"https://www.jll.de/en/trends-and-insights/research/germany-logistics-q1-2026"},{id:"pub-010",publish_date:"2026-03-28",firm:"CBRE",title:"Germany Logistics MarketView Q1 2026",country:"Germany",sector:"Industrial & Logistics",summary:"CBRE highlights a recovery in German logistics investment with Q1 2026 volumes of €1.4bn. Yield stabilisation in core markets signals renewed investor confidence. ESG-compliant assets continue to attract the strongest pricing premium, commanding 25–50bps tighter yields than non-compliant stock.",url:"https://www.cbre.de/insights/reports/germany-logistics-marketview-q1-2026"},{id:"pub-011",publish_date:"2026-05-02",firm:"Knight Frank",title:"Germany Logistics Investment Quarterly Q1 2026",country:"Germany",sector:"Industrial & Logistics",summary:"Knight Frank reports that Germany logistics remains one of Europe's most active investment markets, with cross-border capital accounting for 58% of Q1 2026 volumes. Leasehold structures are increasingly preferred by retailers seeking flexibility. Prime net initial yields holding at 4.80% in Frankfurt and Munich.",url:"https://www.knightfrank.de/research/germany-logistics-2026"},{id:"pub-012",publish_date:"2026-04-14",firm:"Colliers",title:"Germany Industrial Real Estate Market Insights Q1 2026",country:"Germany",sector:"Industrial & Logistics",summary:"Colliers notes a marked improvement in occupier sentiment across German logistics markets in Q1 2026. Speculative development remains limited, underpinning rental growth. The Cologne-Düsseldorf corridor is emerging as Europe's second-largest logistics cluster by take-up.",url:"https://www.colliers.com/de/research/germany-industrial-q1-2026"},{id:"pub-013",publish_date:"2026-05-10",firm:"Savills",title:"France Logistics Market Watch Q1 2026",country:"France",sector:"Industrial & Logistics",summary:"Savills reports French logistics investment reached €1.1bn in Q1 2026, led by Ile-de-France and Lyon. Prime rents in greater Paris stabilised at €82/sqm/yr following the strong growth of recent years. Demand from e-commerce and FMCG occupiers continues to drive take-up.",url:"https://www.savills.fr/research_articles/fr-logistics-q1-2026"},{id:"pub-014",publish_date:"2026-04-25",firm:"BNP Paribas Real Estate",title:"France Logistics Market Report Q1 2026",country:"France",sector:"Industrial & Logistics",summary:"BNP Paribas RE highlights that France's logistics market has seen strong investment activity in early 2026. The Paris Basin remains the dominant logistics hub, capturing 45% of national take-up. Green building requirements are increasingly standard in new development briefs.",url:"https://www.realestate.bnpparibas.com/france-logistics-q1-2026"},{id:"pub-015",publish_date:"2026-03-10",firm:"CBRE",title:"France Industrial & Logistics Pulse Q1 2026",country:"France",sector:"Industrial & Logistics",summary:"CBRE notes French logistics market stabilisation after 2024 yield corrections. Investment returns are improving as prime rents hold firm and financing costs ease. Speculative development is constrained by rising construction costs, supporting medium-term rental growth.",url:"https://www.cbre.fr/insights/france-logistics-q1-2026"},{id:"pub-016",publish_date:"2026-05-18",firm:"JLL",title:"France Logistics Snapshot Q1 2026",country:"France",sector:"Industrial & Logistics",summary:"JLL reports French logistics take-up of 890,000 sqm in Q1 2026, broadly in line with the five-year average. Lyon and Marseille submarkets continue to outperform on rental growth. Investor demand is increasingly bifurcated between core product and opportunistic value-add plays.",url:"https://www.jll.fr/fr/tendances-et-analyses/recherches/france-logistics-2026"},{id:"pub-017",publish_date:"2026-04-30",firm:"Savills",title:"Netherlands Logistics Market Q1 2026 Update",country:"Netherlands",sector:"Industrial & Logistics",summary:"Savills reports Dutch logistics prime yields stabilised at 5.00% in Q1 2026, recovering from the correction of 2023–2024. Rotterdam and Venlo remain Europe's premier logistics hubs, with prime rents reaching €90/sqm/yr. Structural demand from global supply chain reconfiguration continues.",url:"https://www.savills.nl/research_articles/netherlands-logistics-q1-2026"},{id:"pub-018",publish_date:"2026-03-22",firm:"Knight Frank",title:"Netherlands Industrial Investment Review 2026",country:"Netherlands",sector:"Industrial & Logistics",summary:"Knight Frank highlights the Netherlands as Europe's most liquid logistics investment market on a per-capita basis. Cross-border buyers accounted for 72% of 2025 volumes. Prime yields are expected to firm by 25–50bps through 2026 as debt costs ease.",url:"https://www.knightfrank.nl/research/netherlands-logistics-2026"},{id:"pub-019",publish_date:"2026-05-05",firm:"CBRE",title:"Netherlands Logistics MarketView Q1 2026",country:"Netherlands",sector:"Industrial & Logistics",summary:"CBRE Q1 2026 shows Dutch logistics take-up of 425,000 sqm, led by 3PL and retail occupiers. Availability remains tight at 2.5%, the lowest since 2021. New development is increasingly concentrated in decarbonisation-compliant assets with solar and EV charging infrastructure.",url:"https://www.cbre.nl/insights/netherlands-logistics-q1-2026"},{id:"pub-020",publish_date:"2026-05-12",firm:"Savills",title:"Spain Logistics Market Q1 2026",country:"Spain",sector:"Industrial & Logistics",summary:"Savills reports Spanish logistics investment of €620m in Q1 2026, with Madrid capturing 55% of national volumes. Prime rents in Madrid's prime ring reached €80/sqm/yr for the first time. Yield compression is expected as the market attracts increased pan-European capital allocation.",url:"https://www.savills.es/research_articles/spain-logistics-q1-2026"},{id:"pub-021",publish_date:"2026-04-08",firm:"CBRE",title:"Spain Industrial & Logistics Report Q1 2026",country:"Spain",sector:"Industrial & Logistics",summary:"CBRE notes Spain's logistics sector continues to benefit from Iberian peninsula positioning as a nearshoring destination. Barcelona's logistics market is tightening with vacancy at 2.8%. Prime gross initial yields in Madrid are tracking at 5.25%, with further compression forecast.",url:"https://www.cbre.es/insights/spain-logistics-q1-2026"},{id:"pub-022",publish_date:"2026-03-18",firm:"JLL",title:"Spain Logistics Market Report Q1 2026",country:"Spain",sector:"Industrial & Logistics",summary:"JLL reports Spanish logistics take-up in Q1 2026 of 380,000 sqm, with Madrid and Barcelona accounting for 70% of activity. E-commerce and automotive sectors lead occupier demand. New supply is limited, with speculative starts constrained by elevated construction costs.",url:"https://www.jll.es/es/tendencias-y-perspectivas/investigacion/spain-logistics-2026"},{id:"pub-023",publish_date:"2026-04-20",firm:"Savills",title:"Italy Industrial & Logistics Market Q1 2026",country:"Italy",sector:"Industrial & Logistics",summary:"Savills reports Italian logistics investment of €480m in Q1 2026, with Milan and Bologna the most active markets. Prime net initial yields held at 5.00% following stabilisation from 2023 corrections. Demand from fast fashion and consumer goods sectors is underpinning rental growth.",url:"https://www.savills.it/research_articles/italy-logistics-q1-2026"},{id:"pub-024",publish_date:"2026-03-25",firm:"Colliers",title:"Italy Logistics Market Insights 2026",country:"Italy",sector:"Industrial & Logistics",summary:"Colliers highlights Italy as an increasingly attractive European logistics investment destination. Prime rents in greater Milan reached €72/sqm/yr, with further growth expected. Infrastructure investment by the Italian government is improving accessibility in southern logistics corridors.",url:"https://www.colliers.com/it/research/italy-logistics-2026"},{id:"pub-025",publish_date:"2026-05-22",firm:"Savills",title:"Poland Logistics Market H1 2026 Update",country:"Poland",sector:"Industrial & Logistics",summary:"Savills reports Poland's logistics take-up reached 1.4m sqm in Q1 2026, confirming its position as Central Europe's largest logistics market. Prime rents in Warsaw stabilised at €62/sqm/yr. Net initial yields at 6.25% offer compelling spread versus Western European core markets.",url:"https://www.savills.pl/research_articles/poland-logistics-h1-2026"},{id:"pub-026",publish_date:"2026-04-15",firm:"Colliers",title:"Poland Industrial Market Report Q1 2026",country:"Poland",sector:"Industrial & Logistics",summary:"Colliers' Q1 2026 report highlights Poland's continued attractiveness for logistics occupiers driven by proximity to Western European consumption markets and competitive labour costs. Warsaw Central location commands 15% premium over regional markets. Investor appetite is increasing from Asian institutional buyers.",url:"https://www.colliers.com/pl/research/poland-industrial-q1-2026"},{id:"pub-027",publish_date:"2026-03-30",firm:"JLL",title:"Poland Logistics Market Pulse Q1 2026",country:"Poland",sector:"Industrial & Logistics",summary:"JLL reports Polish logistics vacancy at a historic low of 5.2%, driving rental growth in all major hubs. Wrocław and Łódź are emerging as significant markets. Development pipeline of 1.8m sqm is 35% pre-let, reflecting confident occupier commitments.",url:"https://www.jll.pl/en/trends-and-insights/research/poland-logistics-2026"},{id:"pub-028",publish_date:"2026-04-28",firm:"Savills",title:"Portugal Logistics Market Review Q1 2026",country:"Portugal",sector:"Industrial & Logistics",summary:"Savills reports Portuguese logistics seeing increased investment from European capital as a nearshoring beneficiary. Lisbon prime logistics rents reached €62/sqm/yr with limited new supply. Prime net initial yields at 5.75% offer value relative to Spain and France.",url:"https://www.savills.pt/research_articles/portugal-logistics-q1-2026"},{id:"pub-029",publish_date:"2026-03-12",firm:"CBRE",title:"Portugal Logistics Market Update 2026",country:"Portugal",sector:"Industrial & Logistics",summary:"CBRE highlights Portugal's growing attractiveness as a logistics hub for Iberian and African supply chains. The Setúbal and Azambuja corridors are seeing speculative development for the first time in five years. Prime yields are expected to compress to 5.50% by end-2026.",url:"https://www.cbre.pt/insights/portugal-logistics-2026"},{id:"pub-030",publish_date:"2026-05-14",firm:"Savills",title:"Sweden Logistics Market Q1 2026 Briefing",country:"Sweden",sector:"Industrial & Logistics",summary:"Savills reports Swedish logistics investment recovering strongly with Q1 2026 volumes of SEK 4.2bn. Stockholm Arlanda and Gothenburg remain key logistics locations. Prime rents at SEK 1,450/sqm/yr with yields stabilising at 5.00% following 2023–2024 correction.",url:"https://www.savills.se/research_articles/sweden-logistics-q1-2026"},{id:"pub-031",publish_date:"2026-04-03",firm:"JLL",title:"Sweden Industrial & Logistics Market Update 2026",country:"Sweden",sector:"Industrial & Logistics",summary:"JLL reports Swedish logistics benefiting from Nordic e-commerce growth and strong cold storage demand. Prime rents in Stockholm have stabilised after 2024 growth. Sustainability credentials are now a prerequisite for institutional investment in Nordic logistics assets.",url:"https://www.jll.se/sv/trender-och-insikter/forskning/sweden-logistics-2026"},{id:"pub-032",publish_date:"2026-05-02",firm:"Savills",title:"Denmark Logistics Market Review Q1 2026",country:"Denmark",sector:"Industrial & Logistics",summary:"Savills reports Danish logistics prime yields held at 5.25% in Q1 2026 with Copenhagen's western corridor driving new development. Prime rents of DKK 950/sqm/yr reflect tight supply conditions. Investment activity picking up with cross-border buyers targeting Nordic gateway assets.",url:"https://www.savills.dk/research_articles/denmark-logistics-q1-2026"},{id:"pub-033",publish_date:"2026-03-08",firm:"Knight Frank",title:"Nordic Logistics Investment Outlook 2026",country:"Denmark",sector:"Industrial & Logistics",summary:"Knight Frank's Nordic logistics report highlights Denmark as a key gateway market with improving occupier fundamentals. Vacancy is at 3.5%, the lowest in five years. Prime yields are forecast to compress 25bps through 2026 as Nordic logistics joins the core European investment universe.",url:"https://www.knightfrank.dk/research/nordic-logistics-2026"},{id:"pub-034",publish_date:"2026-04-17",firm:"Savills",title:"Norway Logistics Market Q1 2026 Update",country:"Norway",sector:"Industrial & Logistics",summary:"Savills reports Oslo logistics prime rents confirmed at NOK 2,100/sqm/yr by multiple independent sources. Net initial yields compressed to 5.25% in Q1 2026 driven by strong domestic and cross-border investor demand. ESG requirements are the dominant factor in new development briefs.",url:"https://www.savills.no/research_articles/norway-logistics-q1-2026"},{id:"pub-035",publish_date:"2026-03-22",firm:"CBRE",title:"Norway Industrial & Logistics Market Review 2026",country:"Norway",sector:"Industrial & Logistics",summary:"CBRE highlights Norway's logistics market resilience supported by oil sector wealth and strong domestic consumption. Prime rents have grown 4% year-on-year in the Oslo region. Sustainability standards are the highest in Europe for new logistics development, reflecting Norway's green building mandate.",url:"https://www.cbre.no/insights/norway-logistics-2026"},{id:"pub-036",publish_date:"2026-02-28",firm:"Savills",title:"European Logistics Investment Outlook 2026",country:"UK",sector:"Industrial & Logistics",summary:"Savills' annual European logistics investment outlook identifies the UK, Germany, and Netherlands as the three most liquid markets for cross-border capital. Pan-European yields are forecast to compress 25–50bps through 2026 as financing costs fall. Total European logistics investment is forecast at €35–40bn for 2026.",url:"https://www.savills.co.uk/research_articles/229130/european-logistics-2026"},{id:"pub-037",publish_date:"2026-01-20",firm:"Knight Frank",title:"European Industrial & Logistics Benchmark 2026",country:"Germany",sector:"Industrial & Logistics",summary:"Knight Frank's annual benchmark identifies Germany and the UK as offering the deepest logistics investment liquidity i
