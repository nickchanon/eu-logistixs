<!DOCTYPE html>
<html class="dark" lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>European Logistics Research Intelligence Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/recharts@2/umd/Recharts.js"></script>
<style>
:root {
  --bg: #0a0f1a;
  --card: #0f172a;
  --border: #1e293b;
  --amber: #F59E0B;
  --amber-dim: rgba(245,158,11,0.12);
  --amber-border: rgba(245,158,11,0.3);
  --text: #f1f5f9;
  --muted: #94a3b8;
  --sidebar-w: 200px;
  --red: #EF4444;
  --green: #10B981;
  --blue: #3B82F6;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; }
a { color: inherit; text-decoration: none; }
button { cursor: pointer; font-family: inherit; }
input, select { font-family: inherit; }

#root { display: flex; height: 100vh; overflow: hidden; }

.sidebar {
  width: var(--sidebar-w);
  background: var(--card);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
}
.sidebar-logo {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo .logo-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--amber);
  line-height: 1.2;
}
.sidebar-logo .logo-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
}
.sidebar-nav { padding: 8px 0; flex: 1; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 500;
  transition: all 0.15s;
  cursor: pointer;
  border-left: 3px solid transparent;
}
.nav-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.nav-item.active { color: var(--amber); background: var(--amber-dim); border-left-color: var(--amber); }
.nav-item svg { flex-shrink: 0; }

.main-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  background: var(--bg);
}

.page-header { margin-bottom: 24px; }
.page-header h1 { font-size: 22px; font-weight: 700; color: var(--text); }
.page-header p { color: var(--muted); font-size: 13px; margin-top: 4px; }

.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.kpi-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.kpi-card.amber { border-color: var(--amber-border); background: var(--amber-dim); }
.kpi-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.kpi-value { font-size: 28px; font-weight: 700; color: var(--text); line-height: 1; }
.kpi-card.amber .kpi-value { color: var(--amber); }
.kpi-sub { font-size: 11px; color: var(--muted); }

.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 20px;
}
.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.country-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 16px;
}
.country-tab {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.country-tab:hover { border-color: var(--amber); color: var(--amber); }
.country-tab.active { background: var(--amber); color: #000; border-color: var(--amber); font-weight: 600; }

.savills-card {
  background: var(--amber-dim);
  border: 1px solid var(--amber-border);
  border-left: 4px solid var(--amber);
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
}
.savills-card-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.savills-label { font-size: 11px; font-weight: 700; color: var(--amber); text-transform: uppercase; letter-spacing: 0.06em; }
.savills-summary { font-size: 13px; color: var(--text); line-height: 1.6; }
.chip-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.chip {
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  background: rgba(255,255,255,0.08);
  color: var(--text);
  border: 1px solid var(--border);
}
.chip.yield { background: rgba(245,158,11,0.15); color: var(--amber); border-color: var(--amber-border); }
.chip.rent { background: rgba(16,185,129,0.12); color: var(--green); border-color: rgba(16,185,129,0.3); }

.accordion-item {
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 8px;
  overflow: hidden;
}
.accordion-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px;
  background: rgba(255,255,255,0.02);
  cursor: pointer;
  user-select: none;
}
.accordion-header:hover { background: rgba(255,255,255,0.05); }
.accordion-body { padding: 12px 14px; border-top: 1px solid var(--border); font-size: 13px; color: var(--muted); line-height: 1.6; }

.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th {
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 10px 12px;
  border-bottom: 1px solid rgba(30,41,59,0.6);
  font-size: 13px;
  color: var(--text);
  vertical-align: top;
}
tr:last-child td { border-bottom: none; }
tr.savills-row { background: rgba(245,158,11,0.06); }
tr.savills-row:hover { background: rgba(245,158,11,0.1); }
tr:not(.savills-row):hover { background: rgba(255,255,255,0.02); }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
  white-space: nowrap;
}

.bar-wrap { margin-bottom: 10px; }
.bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; font-size: 12px; color: var(--muted); }
.bar-bg { height: 8px; background: rgba(255,255,255,0.07); border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 0.4s ease; }

.status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }

/* Filters */
.filter-row {
  display: flex;
  gap: 10px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-input {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 12px;
  border-radius: 6px;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
}
.filter-input:focus { border-color: var(--amber); }
.filter-select {
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 10px;
  border-radius: 6px;
  font-size: 13px;
  outline: none;
  cursor: pointer;
}
.btn {
  padding: 7px 16px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  border: none;
  transition: all 0.15s;
}
.btn-amber { background: var(--amber); color: #000; }
.btn-amber:hover { background: #d97706; }
.btn-ghost { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
.btn-ghost:hover { color: var(--text); background: rgba(255,255,255,0.1); }

/* Coverage matrix */
.matrix-cell {
  width: 48px;
  height: 32px;
  border-radius: 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
}

/* Mobile bottom nav */
.bottom-nav {
  display: none;
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  z-index: 100;
  padding: 6px 0 env(safe-area-inset-bottom, 6px);
}
.bottom-nav-items { display: flex; }
.bottom-nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 4px;
  color: var(--muted);
  font-size: 10px;
  font-weight: 500;
  cursor: pointer;
  border: none;
  background: transparent;
  transition: color 0.15s;
}
.bottom-nav-item.active { color: var(--amber); }

/* Form */
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-label { font-size: 12px; font-weight: 600; color: var(--muted); }
.form-input {
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 9px 12px;
  border-radius: 6px;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s;
  width: 100%;
}
.form-input:focus { border-color: var(--amber); }
textarea.form-input { resize: vertical; min-height: 80px; }

/* Alert cards */
.alert { padding: 12px 14px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; }
.alert-red { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25); color: #fca5a5; }
.alert-amber { background: var(--amber-dim); border: 1px solid var(--amber-border); color: #fcd34d; }
.alert-green { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); color: #6ee7b7; }

/* Pub card (mobile) */
.pub-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 10px;
}
.pub-card.savills-card-pub { border-left: 3px solid var(--amber); background: rgba(245,158,11,0.05); }

/* Run card */
.run-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
.firm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; margin-top: 14px; }
.firm-stat-card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
.firm-stat-name { font-size: 12px; font-weight: 600; margin-bottom: 8px; }
.firm-stat-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 3px; }
.firm-stat-val { color: var(--text); font-weight: 600; }

.section-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 10px;
}

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

.outlook-badge { padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }

.chart-legend { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
.legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); cursor: pointer; }
.legend-dot { width: 12px; height: 3px; border-radius: 2px; }

.sortable-th { cursor: pointer; user-select: none; }
.sortable-th:hover { color: var(--text); }

/* Heatmap */
.heat-0 { background: rgba(239,68,68,0.15); color: #fca5a5; }
.heat-1 { background: rgba(245,158,11,0.15); color: #fcd34d; }
.heat-2 { background: rgba(16,185,129,0.15); color: #6ee7b7; }
.heat-3 { background: rgba(59,130,246,0.15); color: #93c5fd; }

@media (max-width: 768px) {
  .sidebar { display: none; }
  .bottom-nav { display: block; }
  .main-content { padding: 16px; padding-bottom: 80px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .two-col { grid-template-columns: 1fr; }
  .three-col { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .filter-row { gap: 8px; }
  .filter-input, .filter-select { font-size: 12px; }
}
@media (max-width: 500px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .kpi-value { font-size: 22px; }
}
</style>
</head>

function buildTS(country,yields,rents,yieldUnit,rentUnit){
  const pts=[];
  FIRMS.forEach(firm=>{
    QUARTERS.forEach((q,i)=>{
      if(yields[firm]?.[i]!==undefined)pts.push({quarter:q,country,firm,metric:"yield",value:yields[firm][i],unit:yieldUnit});
      if(rents[firm]?.[i]!==undefined)pts.push({quarter:q,country,firm,metric:"rent",value:rents[firm][i],unit:rentUnit});
    });
  });
  return pts;
}

function PublicationsPage({extraPubs}){
  const [search,setSearch]=useState("");
  const [firmF,setFirmF]=useState("");
  const [countryF,setCountryF]=useState("");
  const [dateFrom,setDateFrom]=useState("");
  const [dateTo,setDateTo]=useState("");
  const [sortKey,setSortKey]=useState("publish_date");
  const [sortDir,setSortDir]=useState("desc");
  const allPubs=[...PUBLICATIONS,...extraPubs];

  const filtered=useMemo(()=>{
    let p=[...allPubs];
    if(search)p=p.filter(x=>x.title.toLowerCase().includes(search.toLowerCase())||x.summary.toLowerCase().includes(search.toLowerCase()));
    if(firmF)p=p.filter(x=>x.firm===firmF);
    if(countryF)p=p.filter(x=>x.country===countryF);
    if(dateFrom)p=p.filter(x=>x.publish_date>=dateFrom);
    if(dateTo)p=p.filter(x=>x.publish_date<=dateTo);
    p.sort((a,b)=>{
      const av=a[sortKey]||"",bv=b[sortKey]||"";
      return sortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
    });
    return p;
  },[allPubs,search,firmF,countryF,dateFrom,dateTo,sortKey,sortDir]);

  const toggleSort=(k)=>{
    if(sortKey===k)setSortDir(d=>d==="asc"?"desc":"asc");

                <SortHdr k="firm" label="Firm"/>

// ─── COVERAGE GAPS PAGE ───────────────────────────────────────────────────────
function GapsPage(){
  // Build matrix
  const matrix={};
  FIRMS.forEach(f=>{matrix[f]={};COUNTRIES.forEach(c=>{matrix[f][c]=0;});});
  PUBLICATIONS.forEach(p=>{if(matrix[p.firm]&&matrix[p.firm][p.country]!==undefined)matrix[p.firm][p.country]++;});

  const totalCells=FIRMS.length*COUNTRIES.length;
  const coveredCells=FIRMS.reduce((a,f)=>a+COUNTRIES.filter(c=>matrix[f][c]>0).length,0);
  const zeroCells=totalCells-coveredCells;
  const fullCoverCells=FIRMS.reduce((a,f)=>a+COUNTRIES.filter(c=>matrix[f][c]>=2).length,0);
  const savGaps=COUNTRIES.filter(c=>matrix["Savills"][c]===0).length;

  // Savills opportunity markets (≥2 competitors but Savills=0)
  const oppMarkets=COUNTRIES.filter(c=>{
    const compCoverage=FIRMS.filter(f=>f!=="Savills"&&matrix[f][c]>0).length;
    return compCoverage>=2&&matrix["Savills"][c]===0;
  });
  const zeroCoverMarkets=COUNTRIES.filter(c=>FIRMS.every(f=>matrix[f][c]===0));
  const wellCovered=COUNTRIES.filter(c=>FIRMS.filter(f=>matrix[f][c]>0).length===FIRMS.length);

  function heatClass(n){
    if(n===0)return"heat-0";
    if(n===1)return"heat-1";
    if(n>=3)return"heat-3";
    return"heat-2";
  }

  return(
    <div>
      <div className="page-header">
        <h1>Coverage Gaps</h1>
        <p>Identify research gaps across firms and markets</p>
      </div>

      <div className="kpi-grid">
        <div className="kpi-card">
          <span className="kpi-label">Coverage Rate</span>
          <span className="kpi-value">{((coveredCells/totalCells)*100).toFixed(0)}%</span>
          <span className="kpi-sub">{coveredCells}/{totalCells} firm×market cells</span>
        </div>
        <div className="kpi-card amber">
          <span className="kpi-label">Savills Gaps</span>
          <span className="kpi-value">{savGaps}</span>
          <span className="kpi-sub">Markets with no Savills report</span>
        </div>
        <div className="kpi-card" style={{borderColor:"rgba(239,68,68,0.3)",background:"rgba(239,68,68,0.06)"}}>
          <span className="kpi-label">Zero-Coverage Cells</span>
          <span className="kpi-value" style={{color:"var(--red)"}}>{zeroCells}</span>
          <span className="kpi-sub">No firm has covered these</span>
        </div>
        <div className="kpi-card" style={{borderColor:"rgba(16,185,129,0.3)",background:"rgba(16,185,129,0.06)"}}>
          <span className="kpi-label">Full Coverage</span>
          <span className="kpi-value" style={{color:"var(--green)"}}>{wellCovered.length}</span>
          <span className="kpi-sub">Markets with all 6 firms</span>
        </div>
      </div>

      {/* Heatmap */}
      <div className="card">
        <div className="card-title">{Icons.BarChart3} Coverage Heatmap</div>
        <div style={{display:"flex",gap:16,marginBottom:12,flexWrap:"wrap"}}>
          {[["heat-0","0 — No coverage"],["heat-1","1 — Thin"],["heat-2","2 — Covered"],["heat-3","3+ — Well covered"]].map(([cls,lbl])=>(
            <span key={cls} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,color:"var(--muted)"}}>
              <span className={`matrix-cell ${cls}`} style={{width:24,height:16,borderRadius:3,display:"inline-block"}}/>
              {lbl}
            </span>
          ))}
        </div>
        <div className="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Market</th>
                {FIRMS.map(f=><th key={f} style={{textAlign:"center"}}>{FIRM_SHORT[f]}</th>)}
                <th style={{textAlign:"center"}}>Total</th>
              </tr>
            </thead>
            <tbody>
              {COUNTRIES.map(c=>{
                const total=FIRMS.reduce((a,f)=>a+(matrix[f][c]>0?1:0),0);
                return(
                  <tr key={c}>
                    <td style={{fontWeight:500,whiteSpace:"nowrap"}}>{countryFlag(c)} {c}</td>
                    {FIRMS.map(f=>{
                      const n=matrix[f][c];
                      const isSav=f==="Savills";
                      return(
                        <td key={f} style={{textAlign:"center",padding:"6px"}}>
                          <span className={`matrix-cell ${heatClass(n)}`} style={{width:38,height:24,borderRadius:4,display:"inline-flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,border:isSav&&n>0?"2px solid #F59E0B44":"none"}}>
                            {n===0?"–":n}
                          </span>
                        </td>
                      );
                    })}
                    <td style={{textAlign:"center",fontWeight:700,color:total===FIRMS.length?"var(--green)":total===0?"var(--red)":"var(--amber)"}}>{total}/{FIRMS.length}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      <div className="two-col">
        <div className="card" style={{marginBottom:0}}>
          <div className="card-title" style={{color:"var(--amber)"}}>★ Savills Opportunity Markets</div>
          {oppMarkets.length===0?<p style={{color:"var(--muted)",fontSize:13}}>No opportunity gaps found.</p>:oppMarkets.map(c=>(
            <div key={c} className="alert alert-amber">
              <strong>{countryFlag(c)} {c}</strong> — Competitors active, Savills has no coverage
            </div>
          ))}
          {savGaps>0&&COUNTRIES.filter(c=>matrix["Savills"][c]===0&&!oppMarkets.includes(c)).map(c=>(
            <div key={c} className="alert alert-amber">
              <strong>{countryFlag(c)} {c}</strong> — Savills gap (limited competitor coverage)
            </div>
          ))}
        </div>
        <div>
          <div className="card" style={{marginBottom:16}}>
            <div className="card-title" style={{color:"var(--red)"}}>Zero Coverage Alerts</div>
            {zeroCoverMarkets.length===0?<p style={{color:"var(--muted)",fontSize:13}}>All markets have at least one firm covering them.</p>:zeroCoverMarkets.map(c=>(
              <div key={c} className="alert alert-red">{countryFlag(c)} {c} — No firm has published research</div>
            ))}
          </div>
          <div className="card" style={{marginBottom:0}}>
            <div className="card-title" style={{color:"var(--green)"}}>Well-Covered Markets</div>
            {wellCovered.length===0?<p style={{color:"var(--muted)",fontSize:13}}>No market has full 6-firm coverage yet.</p>:wellCovered.map(c=>(
              <div key={c} className="alert alert-green">{countryFlag(c)} {c} — All {FIRMS.length} firms covered</div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function AddPage({onAdd}){

    if(!form.title||!form.date||!form.country){setStatus("error");return;}
    const entry={id:"user-"+Date.now(),publish_date:form.date,firm:form.firm,title:form.title,country:form.country,sector:"Industrial & Logistics",summary:form.summary,url:form.url,primeYield:form.primeYield,primeRent:form.primeRent,rentUnit:form.rentUnit};

            <div style={{display:"flex",gap:20,flexWrap:"wrap"}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:700,color:"var(--amber)"}}>{run.totals.publicationsFound}</div>
                <div style={{fontSize:11,color:"var(--muted)"}}>Publications Found</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:700,color:"var(--green)"}}>{run.totals.newPublications}</div>
                <div style={{fontSize:11,color:"var(--muted)"}}>New Publications</div>
              </div>
            </div>
          </div>
          <div className="section-label" style={{marginTop:20}}>Per-Firm Results</div>
          <div className="firm-grid">
            {run.agents.map(a=>(
              <div key={a.firm} className="firm-stat-card" style={{borderLeft:`3px solid ${FIRM_COLORS[a.firm]||"var(--border)"}`}}>
                <div className="firm-stat-name" style={{color:FIRM_COLORS[a.firm]||"var(--text)"}}>{FIRM_SHORT[a.firm]||a.firm}</div>
                <div style={{marginBottom:8}}><StatusBadge status={a.status}/></div>
                <div className="firm-stat-row"><span>Publications found</span><span className="firm-stat-val">{a.publicationsFound}</span></div>
                <div className="firm-stat-row"><span>New publications</span><span className="firm-stat-val">{a.newPublications}</span></div>
                <div className="firm-stat-row"><span>Yield datapoints</span><span className="firm-stat-val">{a.newYieldDatapoints}</span></div>
                <div className="firm-stat-row"><span>Rent datapoints</span><span className="firm-stat-val">{a.newRentDatapoints}</span></div>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── SIDEBAR NAV ─────────────────────────────────────────────────────────────
const NAV=[
  {id:"overview",label:"Overview",icon:"LayoutDashboard"},
  {id:"publications",label:"Publications",icon:"FileText"},
  {id:"yields",label:"Yields & Rents",icon:"TrendingDown"},
  {id:"gaps",label:"Coverage Gaps",icon:"AlertCircle"},
  {id:"add",label:"Add Entry",icon:"PlusCircle"},
  {id:"log",label:"Agent Log",icon:"Bot"},
];

function NavItem({item,active,navigate}){
  return(
    <div className={`nav-item${active?" active":""}`} onClick={()=>navigate(item.id)}>
      {Icons[item.icon]||Icons.FileText}
      {item.label}
    </div>
  );
}

// ─── APP ─────────────────────────────────────────────────────────────────────
function App(){
  const [page,navigate]=useHash();
  const [extraPubs,setExtraPubs]=useState([]);

  const handleAdd=(entry)=>setExtraPubs(p=>[entry,...p]);

  const renderPage=()=>{
    switch(page){
      case"publications":return<PublicationsPage extraPubs={extraPubs}/>;
      case"yields":return<YieldsPage/>;
      case"gaps":return<GapsPage/>;
      case"add":return<AddPage onAdd={handleAdd}/>;
      case"log":return<LogPage/>;
      default:return<OverviewPage/>;
    }
  };

  return(
    <div id="root-inner" style={{display:"flex",height:"100vh",width:"100%",overflow:"hidden"}}>
      {/* Sidebar */}
      <div className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-title">EU Logistics Intelligence</div>
          <div className="logo-sub">Research Dashboard</div>
        </div>
        <div className="sidebar-nav">
          {NAV.map(item=><NavItem key={item.id} item={item} active={page===item.id} navigate={navigate}/>)}
        </div>
        <div style={{padding:"16px",borderTop:"1px solid var(--border)",fontSize:11,color:"var(--muted)"}}>
          Last updated: 2026-06-02<br/>
          <span style={{color:"var(--amber)",fontWeight:600}}>Savills</span> Research Platform
        </div>
      </div>

      {/* Main */}
      <div className="main-content">
        {renderPage()}
      </div>

      {/* Bottom nav (mobile) */}
      <div className="bottom-nav">
        <div className="bottom-nav-items">
          {NAV.map(item=>(
            <button key={item.id} className={`bottom-nav-item${page===item.id?" active":""}`} onClick={()=>navigate(item.id)}>
              {Icons[item.icon]||Icons.FileText}
              <span>{item.label.split(" ")[0]}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
